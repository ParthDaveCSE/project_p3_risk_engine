parameters:
  hemoglobin:
    unit: "g/dL"
    absolute_min: 0.0
    absolute_max: 30.0
    critical_low: 8.0
    critical_high: 20.0
    min_normal: 12.0
    max_normal: 17.0
  glucose:
    unit: "mg/dL"
    absolute_min: 10.0
    absolute_max: 1000.0
    critical_low: 50.0
    critical_high: 200.0
    min_normal: 70.0
    max_normal: 99.0
  wbc:
    unit: "/μL"
    absolute_min: 500.0
    absolute_max: 100000.0
    critical_low: 2000.0
    critical_high: 20000.0
    min_normal: 4000.0
    max_normal: 11000.0
  platelets:
    unit: "/μL"
    absolute_min: 10000.0
    absolute_max: 1000000.0
    critical_low: 50000.0
    critical_high: 800000.0
    min_normal: 150000.0
    max_normal: 450000.0
  creatinine:
    unit: "mg/dL"
    absolute_min: 0.1
    absolute_max: 15.0
    critical_low: 0.3
    critical_high: 5.0
    min_normal: 0.6
    max_normal: 1.3

confidence:
  high_threshold: 0.80
  moderate_threshold: 0.50
  interpretations:
    high: "Data quality sufficient – proceed with prediction"
    moderate: "Data quality concerns detected – review recommended"
    low: "Data quality insufficient – manual verification required"

system_settings:
  minimum_confidence_threshold: 0.80

model:
  recall_target: 0.80
  default_threshold: 0.5

logistic_regression:
  class_weight: 'balanced'
  solver: liblinear
  max_iter: 1000
  random_state: 42

random_forest:
  class_weight: 'balanced'
  n_estimators: 100
  max_depth: 10
  random_state: 42
  n_jobs: -1

paths:
  train_features: data/processed/train_features.csv
  test_features: data/processed/test_features.csv
  model_artifact: models/artifacts/random_forest.joblib
  baseline_artifact: models/artifacts/logistic_regression.joblib
  threshold_artifact: models/artifacts/threshold_config.json
  model_dir: models/artifacts