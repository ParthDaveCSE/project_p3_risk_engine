name: Clinical Risk Engine - CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # --- Job 1: Lint ------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync
      - name: Run ruff check
        run: uv run ruff check src/ tests/

  # --- Job 2: Security --------------------------------------------------------
  security:
    name: Security Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv and pip-audit
        run: pip install uv pip-audit
      - name: Sync dependencies
        run: uv sync
      - name: Scan for dependency vulnerabilities
        run: |
          uv run pip freeze > /tmp/requirements.txt
          pip-audit -r /tmp/requirements.txt
        # PORTFOLIO vs PRODUCTION:
        # continue-on-error: true  ← portfolio (no real patient data)
        # continue-on-error: false ← production (vulnerabilities block deploy)
        continue-on-error: true

  # --- Job 3: Validate Config ------------------------------------------------
  validate-config:
    name: Validate Clinical Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync
      - name: Validate clinical_rules.yaml
        run: |
          uv run python -m src.cli.risk_engine validate \
            --config config/clinical_rules.yaml
      - name: Verify lock file is current
        run: uv lock --check

  # --- Job 4: Test -----------------------------------------------------------
  test:
    name: Run Tests (134 in CI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync
      - name: Run full test suite
        run: uv run pytest tests/ -v --tb=short
        # 126 unit tests + 8 Tier 1 integration = 134 always-run
        # 4 Tier 2 tests skip (no model artifacts in CI) — expected and correct
      - name: Upload application log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-logs
          path: logs/app.log
          retention-days: 7

  # --- Job 5: Deploy (CD) ----------------------------------------------------
  #
  # WHAT THIS DELIVERS vs WHAT "DEPLOYED" MEANS:
  # This job produces a deployable artifact system — not a deployed system.
  #
  # What this delivers:
  #   ✓ Deployment manifest (git commit, env, config hashes)
  #   ✓ CLI verified end-to-end on sample inputs
  #   ✓ Versioned release tag (traceable to MLflow run)
  #   ✓ Deployment package uploaded to GitHub artifacts
  #   ✓ Rollback reference stored
  #
  deploy:
    name: Package and Deploy
    runs-on: ubuntu-latest
    needs: [lint, security, validate-config, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync

      - name: Generate deployment manifest
        run: |
          python - <<'EOF'
          import json, os, hashlib, sys, sklearn, datetime
          manifest = {
              "deployed_at":     datetime.datetime.utcnow().isoformat() + "Z",
              "git_commit":      os.environ.get("GITHUB_SHA", "unknown")[:12],
              "python_version":  sys.version.split()[0],
              "sklearn_version": sklearn.__version__,
              "config_files": [
                  "config/clinical_rules.yaml", "config/pima_rules.yaml"
              ],
          }
          for cfg in manifest["config_files"]:
              if os.path.exists(cfg):
                  with open(cfg, "rb") as f:
                      key = cfg.replace("/", "_").replace(".", "_")
                      manifest[key + "_hash"] = hashlib.md5(f.read()).hexdigest()
          with open("deployment_manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          EOF

      - name: CLI end-to-end verification
        run: |
          uv run python src/cli/risk_engine.py schema --output json | \
            python -c "import json,sys; d=json.load(sys.stdin); assert 'hemoglobin' in d; print('✓ Schema verified')"
          uv run python src/cli/risk_engine.py validate && \
            echo "✓ Config validation verified"

      - name: Create and push release tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0.0"
          else
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "Previous: ${LATEST:-none} → New: $NEW_TAG"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "PREV_TAG=$LATEST" >> $GITHUB_ENV
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG | commit: $GITHUB_SHA"
          git push origin "$NEW_TAG"

      - name: Store rollback reference
        run: |
          cat > rollback_reference.json << EOF
          {
            "current_tag":  "${{ env.NEW_TAG }}",
            "previous_tag": "${{ env.PREV_TAG }}",
            "rollback_to":  "${{ env.PREV_TAG }}",
            "procedure":    "git checkout PREV_TAG && uv run python src/models/trainer.py && uv run pytest tests/test_integration.py -v"
          }
          EOF
          cat rollback_reference.json

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ env.NEW_TAG }}
          path: |
            deployment_manifest.json
            rollback_reference.json
            config/clinical_rules.yaml
            config/pima_rules.yaml
            pyproject.toml
            uv.lock
          retention-days: 90